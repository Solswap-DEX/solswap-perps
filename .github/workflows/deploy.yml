name: Deploy SolSwap Perps
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env.production
        run: |
          echo "NEXT_PUBLIC_RPC_URL=${{ secrets.NEXT_PUBLIC_RPC_URL }}" >> .env.production
          echo "NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}" >> .env.production
          echo "NEXT_PUBLIC_BUILDER_WALLET=5KUA4a4qFusTvJeSquKsBSEPvhiVedvaj8hE8pVp2vmz" >> .env.production
          echo "NEXT_PUBLIC_SITE_URL=https://perps.solswap.cloud" >> .env.production

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_RPC_URL: ${{ secrets.NEXT_PUBLIC_RPC_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_BUILDER_WALLET: 5KUA4a4qFusTvJeSquKsBSEPvhiVedvaj8hE8pVp2vmz
          NEXT_PUBLIC_SITE_URL: https://perps.solswap.cloud

      - name: Package standalone artifacts
        run: |
          # Per Next.js standalone documentation:
          # We need standalone folder + static + public
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          
          cd .next/standalone
          tar -czf ../../deploy.tar.gz .
          cd ../..
          echo "Archive size: $(du -sh deploy.tar.gz)"

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp/"
          timeout: 30m
          command_timeout: 30m

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            # Stop PM2 before replacing files
            pm2 stop solswap-perps 2>/dev/null || true
            pm2 delete solswap-perps 2>/dev/null || true

            # Kill anything on port 3001
            fuser -k 3001/tcp 2>/dev/null || true
            sleep 2

            # Clean old deployment
            sudo rm -rf /var/www/perps.solswap.cloud/*
            sudo mkdir -p /var/www/perps.solswap.cloud

            # Extract new standalone build
            cd /var/www/perps.solswap.cloud
            tar -xzf /tmp/deploy.tar.gz -C /var/www/perps.solswap.cloud
            rm /tmp/deploy.tar.gz

            # Fix ownership
            sudo chown -R admin:admin /var/www/perps.solswap.cloud

            # Start PM2 using the standalone server.js
            # NO npm install needed on server anymore!
            PORT=3001 pm2 start server.js --name "solswap-perps"
            sleep 5
            pm2 save

            pm2 status
            echo "✅ Deploy complete"

      - name: Health check
        run: |
          sleep 30
          curl -f https://perps.solswap.cloud || exit 1
          echo "✅ perps.solswap.cloud is responding"
